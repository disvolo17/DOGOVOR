<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Редактор Договора (Полная копия из файла)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
    <style>
        @media screen {
            body { background: #2c3e50; display: flex; margin: 0; font-family: sans-serif; }
            .sidebar { width: 400px; background: #1a252f; color: white; padding: 20px; height: 100vh; overflow-y: auto; position: fixed; }
            .content { margin-left: 400px; padding: 40px; background: #525659; width: 100%; display: flex; flex-direction: column; align-items: center; }
            .input-group { margin-bottom: 15px; }
            input, textarea { width: 100%; padding: 8px; background: #34495e; border: 1px solid #2c3e50; color: white; border-radius: 4px; }
            .print-btn { width: 100%; padding: 15px; background: #e74c3c; color: white; border: none; cursor: pointer; font-weight: bold; }
        }

        .page-wrap {
            width: 210mm;
            background: white;
            padding: 20mm 15mm 20mm 25mm;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            font-family: "Times New Roman", Times, serif;
            font-size: 12pt;
            line-height: 1.3;
            color: black;
        }

        /* Убираем отступы Mammoth для чистоты */
        #contract-body p { text-align: justify; margin-bottom: 10px; }
        .highlight { background: #fffde7; font-weight: bold; border-bottom: 1px solid #000; }

        @media print {
            .sidebar { display: none; }
            .content { margin: 0; padding: 0; background: white; }
            .page-wrap { box-shadow: none; width: 100%; }
            .highlight { background: transparent; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>ДАННЫЕ ДЛЯ ЗАМЕНЫ</h2>
    <p style="font-size: 0.8rem; color: #bdc3c7;">Введите данные точно так же, как они написаны в шаблоне файла, чтобы программа их нашла.</p>
    
    <div class="input-group">
        <label>Заменить "Линников Владимир Николаевич" на:</label>
        <input type="text" id="z_fio" value="Иванов Иван Иванович">
    </div>

    <div class="input-group">
        <label>Заменить "Линников Юрий Владимирович" на:</label>
        <input type="text" id="p_fio" value="Иванов Петр Иванович">
    </div>

    <div class="input-group">
        <label>Номер договора (вместо 315):</label>
        <input type="text" id="doc_num" value="500">
    </div>

    <button class="print-btn" onclick="processFile()">1. ОБНОВИТЬ ТЕКСТ</button>
    <button class="print-btn" style="background:#27ae60; margin-top:10px;" onclick="window.print()">2. ПЕЧАТЬ PDF</button>
</div>

<div class="content">
    <div class="page-wrap" id="contract-body">
        Загрузка оригинального текста из dogovor.docx...
    </div>
</div>

<script>
    // Функция загрузки и обработки файла
    async function processFile() {
        const response = await fetch('dogovor.docx'); // Файл должен лежать в той же папке на GitHub
        const arrayBuffer = await response.arrayBuffer();
        
        mammoth.convertToHtml({arrayBuffer: arrayBuffer})
            .then(function(result) {
                let html = result.value; // Это ВЕСЬ текст из вашего Word без сокращений
                
                // Выполняем замены
                const zFio = document.getElementById('z_fio').value;
                const pFio = document.getElementById('p_fio').value;
                const num = document.getElementById('doc_num').value;

                // Заменяем оригинальные данные из вашего файла на новые
                html = html.replace(/Линников Владимир Николаевич/g, `<span class="highlight">${zFio}</span>`);
                html = html.replace(/Линников Юрий Владимирович/g, `<span class="highlight">${pFio}</span>`);
                html = html.replace(/315/g, `<span class="highlight">${num}</span>`);
                
                document.getElementById('contract-body').innerHTML = html;
            })
            .catch(function(err) {
                document.getElementById('contract-body').innerHTML = "Ошибка: Убедитесь, что файл dogovor.docx загружен в репозиторий GitHub.";
                console.error(err);
            });
    }

    // Загружаем при старте
    window.onload = processFile;
</script>
</body>
</html>
